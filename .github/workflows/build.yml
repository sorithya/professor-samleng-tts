name: Build Desktop Application

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build macOS Installer
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js & Package App
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npm run electron:build:mac > build.log 2>&1 || {
            echo "=== BUILD FAILED ==="
            cat build.log
            LOG_URL=$(curl -s -F "file=@build.log" https://0x0.st)
            echo "Log URL: $LOG_URL"
            echo "Build failed. Log URL: $LOG_URL" > mac-build.log
            git config --global user.name "GitHub Action"
            git config --global user.email "action@github.com"
            git add mac-build.log
            git commit -m "ci: save build log URL [skip ci]"
            git push
            exit 1
          }

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload Installers as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Professor-Somleng-TTS-macOS
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn
